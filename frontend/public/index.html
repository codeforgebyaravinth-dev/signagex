<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>RpSignage | Fullstack App</title>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
        <script>
            if (!window.Capacitor) {
                var emergentScript = document.createElement("script");
                emergentScript.src = "https://assets.emergent.sh/scripts/emergent-main.js";
                document.head.appendChild(emergentScript);
            }
        </script>
        <script>
            // When running inside the Capacitor Android app, redirect the root
            // URL to the SignagePlayer entry so the APK behaves like a dedicated
            // player app. This only triggers for native/platform builds.
            try {
                var isNative = false;
                if (window.Capacitor && typeof window.Capacitor.getPlatform === 'function') {
                    isNative = window.Capacitor.getPlatform() !== 'web';
                } else if (/Android|iPhone|iPad|iPod/.test(navigator.userAgent)) {
                    // fallback: detect mobile UA (will also redirect mobile browser)
                    isNative = true;
                }
                if (isNative && window.location.pathname === '/') {
                    window.location.replace('/play');
                }
            } catch (e) {
                // don't break the app if detection fails
                console.warn('player-redirect failed', e);
            }
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
