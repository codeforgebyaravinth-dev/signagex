<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <title>RpSignage | Fullstack App</title>
        <script>
            window.addEventListener("error", function(e) {
                if (e.error instanceof DOMException && e.error.name === "DataCloneError" && e.message && e.message.includes("PerformanceServerTiming")) {
                    e.stopImmediatePropagation();
                    e.preventDefault();
                }
            }, true);
        </script>
        <script>
            if (!window.Capacitor) {
                var emergentScript = document.createElement("script");
                emergentScript.src = "https://assets.emergent.sh/scripts/emergent-main.js";
                document.head.appendChild(emergentScript);
            }
        </script>
        <script>
            // Only redirect to player mode when running inside the actual Capacitor native app
            // NOT for regular mobile browsers
            (function() {
                try {
                    // Check if we're in the Capacitor native app
                    var isCapacitorNativeApp = false;
                    if (window.Capacitor && typeof window.Capacitor.getPlatform === 'function') {
                        var platform = window.Capacitor.getPlatform();
                        // Only treat as native app if NOT web platform
                        isCapacitorNativeApp = platform !== 'web';
                    }
                    
                    // Additional check: look for Capacitor native specific flags
                    var isNativeApp = isCapacitorNativeApp || 
                                     (window.location.protocol === 'capacitor:' || 
                                      window.location.protocol === 'ionic:' ||
                                      window.navigator.userAgent.includes('Capacitor'));
                    
                    // ONLY redirect if we're ABSOLUTELY SURE it's the native app
                    // AND we're at the root path
                    if (isNativeApp && window.location.pathname === '/') {
                        console.log('Native app detected, redirecting to player');
                        window.location.replace('/play');
                    } else if (!isNativeApp && window.location.pathname === '/play') {
                        // Optional: If someone manually goes to /play in a browser,
                        // but they're not authenticated, redirect to login?
                        // This is handled by React Router, so we don't need to do anything here.
                        console.log('Browser mode, staying in web app');
                    }
                } catch (e) {
                    // Don't break the app if detection fails
                    console.warn('player-redirect failed', e);
                }
            })();
        </script>
        <!-- Alternative: Use sessionStorage to remember browser mode -->
        <script>
            (function() {
                // If user came directly to the site via browser (not deep link),
                // store that they're in browser mode
                if (!window.Capacitor && !sessionStorage.getItem('app_mode')) {
                    sessionStorage.setItem('app_mode', 'browser');
                }
                
                // If we're in a Capacitor web view but the user explicitly wants web mode
                if (sessionStorage.getItem('force_web_mode') === 'true') {
                    return;
                }
            })();
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
